name: Download Large File, Split, and Commit to Repo

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct download URL of the large file'
        required: true
      folder_name:
        description: 'Timestamp folder name (MMDDHHMMSS) provided by Python script'
        required: true

jobs:
  split-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download large file into the specified folder
        run: |
          mkdir -p "${{ github.event.inputs.folder_name }}"
          curl --fail -k -L --max-redirs 50 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -c cookies.txt -b cookies.txt \
            -o "${{ github.event.inputs.folder_name }}/downloaded_file" \
            "${{ github.event.inputs.file_url }}"

      - name: Check file size and either split or rename
        run: |
          FOLDER="${{ github.event.inputs.folder_name }}"
          FILE_PATH="$FOLDER/downloaded_file"
          SIZE_MB=$(du -m "$FILE_PATH" | cut -f1)

          if [ "$SIZE_MB" -lt 95 ]; then
            echo "File is ${SIZE_MB}MB (<95MB) – keeping as single file named after folder"
            mv "$FILE_PATH" "$FOLDER/$FOLDER"
          else
            echo "File is ${SIZE_MB}MB (>=95MB) – splitting into 95MB chunks"
            mkdir -p "$FOLDER/chunks"
            split -b 95M "$FILE_PATH" "$FOLDER/chunks/chunk_"
            rm "$FILE_PATH"
          fi

      - name: Commit and push the new folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder_name }}"
          git commit -m "Add ${{ github.event.inputs.folder_name }} from ${{ github.event.inputs.file_url }}" || echo "No changes"
          git push
